<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="100%" height="100%">
  <!-- 아이콘 전체의 선 두께와 색상을 제어하는 그룹 -->
  <g fill="none" stroke="#232323" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 쉴드 (방패) 아웃라인 -->
    <!-- 자물쇠가 들어갈 공간을 위해 우측 상단이 자연스럽게 끊어져 있도록 설계했습니다 -->
    <path d="M 110,40 L 80,30 L 35,45 V 85 C 35,115 55,140 80,155 C 105,140 125,115 125,85 V 80" />

    <!-- 터미널 프롬프트 기호 (>_) -->
    <path d="M 50,70 L 68,88 L 50,106" />
    <path d="M 75,110 H 98" />

    <!-- 자물쇠 몸통 -->
    <rect x="100" y="48" width="44" height="32" rx="5" />

    <!-- 자물쇠 고리 (Shackle) -->
    <path d="M 110,48 V 35 A 12 12 0 0 1 134,35 V 48" />

    <!-- 자물쇠 열쇠 구멍 (Keyhole) -->
    <path d="M 122,56 A 3.5 3.5 0 1 0 119.5,63 L 118,69 H 126 L 124.5,63 A 3.5 3.5 0 0 0 122,56 Z" />

    <!-- 우측 텍스트 (Envio) -->
    <text x="155" y="112" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="76" font-weight="bold" letter-spacing="-1.5">Envio</text>
    
  </g>
</svg>
